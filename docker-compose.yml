services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama

  mork-app:
    build:
      context: ./mork-app
    container_name: mork-app
    environment:
      - NODE_ENV=production
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2:3b}
      - DATABASE_URL=file:/app/prisma/dev.db
      - MORK_WALLET=${MORK_WALLET:-}
      - MORK_WALLET_SECRET_KEY=${MORK_WALLET_SECRET_KEY:-}
      - SOLANA_RPC=${SOLANA_RPC:-https://api.mainnet-beta.solana.com}
    ports:
      - "3000:3000"
    depends_on:
      - ollama
    volumes:
      - mork_app_data:/app/prisma

  mork-core:
    build:
      context: ./services/mork-core
    container_name: mork-core
    env_file: ./.env
    environment:
      - OLLAMA_URL=${OLLAMA_URL}
      - OLLAMA_MODEL=${OLLAMA_MODEL}
    ports:
      - "${MORK_CORE_PORT}:8790"
    depends_on:
      - ollama

  telegram-bridge:
    build:
      context: ./services/telegram-bridge
    container_name: telegram-bridge
    env_file: ./.env
    environment:
      - MORK_CORE_URL=${MORK_CORE_URL}
    depends_on:
      - mork-core

volumes:
  ollama:
  mork_app_data:
